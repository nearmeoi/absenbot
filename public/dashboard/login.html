<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AbsenBot Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>
    <link rel="stylesheet" href="/dashboard/css/dashboard.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-body);
            min-height: 100vh;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            background-color: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--card-radius);
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .brand-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .brand-logo {
            width: 48px;
            height: 48px;
            background-color: rgba(59, 130, 246, 0.1);
            color: var(--primary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
        }

        .brand-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }

        .brand-subtitle {
            font-size: 0.875rem;
            color: var(--text-muted);
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="brand-header">
            <div class="brand-logo">
                <i data-feather="box" style="width: 24px; height: 24px;"></i>
            </div>
            <h1 class="brand-title">Welcome Back</h1>
            <p class="brand-subtitle">Sign in to manage AbsenBot</p>
        </div>

        <div id="error" class="badge badge-danger"
            style="display: none; width: 100%; justify-content: center; padding: 0.75rem; margin-bottom: 1.5rem;"></div>

        <form id="loginForm">
            <div class="form-group">
                <label class="form-label" for="password">Admin Password</label>
                <div style="position: relative;">
                    <div style="position: absolute; left: 12px; top: 10px; color: var(--text-muted);">
                        <i data-feather="lock" style="width: 16px; height: 16px;"></i>
                    </div>
                    <input type="password" id="password" class="form-input" style="padding-left: 2.5rem;"
                        placeholder="Enter your password" required autofocus>
                </div>
            </div>

            <button type="submit" class="btn btn-primary"
                style="width: 100%; justify-content: center; padding: 0.875rem;" id="submitBtn">
                Sign In
            </button>
        </form>
    </div>

    <script>
        feather.replace();

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const password = document.getElementById('password').value;
            const btn = document.getElementById('submitBtn');
            const error = document.getElementById('error');

            btn.disabled = true;
            btn.innerHTML = '<span style="display:inline-block; animation:spin 1s linear infinite"><i data-feather="loader"></i></span> Signing In...';
            feather.replace();

            error.style.display = 'none';

            try {
                const res = await fetch('/dashboard/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });

                const data = await res.json();

                if (data.success) {
                    window.location.href = '/dashboard';
                } else {
                    error.textContent = data.error || 'Login failed';
                    error.style.display = 'flex';
                    btn.disabled = false;
                    btn.textContent = 'Sign In';
                }
            } catch (err) {
                error.textContent = 'Connection error. Please try again.';
                error.style.display = 'flex';
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        });
    </script>
</body>

</html>
