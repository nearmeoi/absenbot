<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AbsenBot Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>
    <link rel="stylesheet" href="/dashboard/css/dashboard.css">
</head>

<body>
    <div class="app">
        <!-- Sidebar -->
        <div class="sidebar-overlay"></div>
        <aside class="sidebar">
            <div class="sidebar-brand">
                <i data-feather="box"></i>
                <span>AbsenBot</span>
            </div>

            <nav class="sidebar-nav">
                <a href="/dashboard" class="nav-link" data-link>
                    <i data-feather="grid"></i>
                    <span>Overview</span>
                </a>
                <a href="/dashboard/users" class="nav-link" data-link>
                    <i data-feather="users"></i>
                    <span>Users</span>
                </a>
                <a href="/dashboard/groups" class="nav-link" data-link>
                    <i data-feather="message-circle"></i>
                    <span>Groups</span>
                </a>
                <a href="/dashboard/scheduler" class="nav-link" data-link>
                    <i data-feather="clock"></i>
                    <span>Scheduler</span>
                </a>
                <a href="/dashboard/settings" class="nav-link" data-link>
                    <i data-feather="settings"></i>
                    <span>Settings</span>
                </a>
                <div style="height:1px; background:var(--border); margin:0.5rem 1rem"></div>
                <a href="/dashboard/development" class="nav-link" data-link>
                    <i data-feather="code"></i>
                    <span>Development</span>
                </a>
                <a href="/dashboard/terminal" class="nav-link" data-link>
                    <i data-feather="terminal"></i>
                    <span>Terminal</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <a href="/dashboard/logout" class="nav-link" style="color: var(--danger)">
                    <i data-feather="log-out"></i>
                    <span>Logout</span>
                </a>
            </div>
        </aside>

        <!-- Main Content Shell -->
        <div class="main-content">
            <header class="topbar">
                <div style="display:flex; align-items:center; gap:1rem">
                    <button class="mobile-toggle" id="sidebarToggle">
                        <i data-feather="menu"></i>
                    </button>
                    <h3 class="page-title">Loading...</h3>
                </div>
            </header>

            <!-- Dynamic Content Container -->
            <main class="content-wrapper" id="app-content">
                <div style="display:flex; justify-content:center; padding:3rem;">
                    <div class="spinner"></div>
                </div>
            </main>
        </div>
    </div>

    <style>
        /* Spinner */
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--bg-surface-hover);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* Toggle Switch Styles (Global) */
        .toggle-switch {
            position: relative;
            width: 44px;
            height: 24px;
            display: inline-block;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--bg-surface-hover);
            border-radius: 24px;
            transition: .3s;
            border: 1px solid var(--border);
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 2px;
            bottom: 2px;
            background-color: var(--text-muted);
            border-radius: 50%;
            transition: .3s;
        }

        input:checked+.toggle-slider {
            background-color: var(--primary);
            border-color: var(--primary);
        }

        input:checked+.toggle-slider:before {
            transform: translateX(20px);
            background-color: white;
        }
    </style>

    <!-- Group Detail Modal -->
    <div id="groupModal" class="modal-overlay" style="display:none">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalGroupName">Group Name</h3>
                <button class="modal-close" onclick="closeGroupModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Content will be injected by JS -->
            </div>
        </div>
    </div>

    <style>
        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .modal-content {
            background: var(--bg-surface);
            border-radius: 16px;
            width: 90%;
            max-width: 480px;
            max-height: 90vh;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .modal-header h3 {
            font-size: 1.1rem;
            font-weight: 600;
            margin: 0;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: var(--text-muted);
            cursor: pointer;
            padding: 0;
            line-height: 1;
        }

        .modal-close:hover {
            color: var(--danger);
        }

        .modal-body {
            padding: 1.5rem;
            overflow-y: auto;
            max-height: calc(90vh - 100px);
        }

        .modal-info-row {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--border);
        }

        .modal-info-row:last-child {
            border-bottom: none;
        }

        .modal-info-label {
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        .modal-info-value {
            font-weight: 500;
            font-size: 0.875rem;
        }

        .modal-section {
            margin-top: 1.5rem;
        }

        .modal-section-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        .modal-toggle-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 0;
        }

        .modal-toggle-info h4 {
            font-size: 0.9rem;
            font-weight: 500;
            margin: 0 0 0.25rem 0;
        }

        .modal-toggle-info p {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin: 0;
        }

        .modal-actions {
            margin-top: 1.5rem;
            display: flex;
            gap: 0.75rem;
        }

        .modal-actions .btn {
            flex: 1;
        }
    </style>

    <script src="/dashboard/js/dashboard.js?v=7.1.1"></script>
</body>

</html>
