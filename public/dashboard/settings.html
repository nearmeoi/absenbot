<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - AbsenBot Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>
    <link rel="stylesheet" href="/dashboard/css/dashboard.css">
</head>

<body>
    <div class="app">
        <div class="sidebar-overlay"></div>

        <aside class="sidebar">
            <div class="sidebar-brand">
                <i data-feather="box"></i>
                <span>AbsenBot</span>
            </div>
            <nav class="sidebar-nav">
                <a href="/dashboard" class="nav-link">
                    <i data-feather="grid"></i>
                    <span>Overview</span>
                </a>
                <a href="/dashboard/users" class="nav-link">
                    <i data-feather="users"></i>
                    <span>Users</span>
                </a>
                <a href="/dashboard/scheduler" class="nav-link">
                    <i data-feather="clock"></i>
                    <span>Scheduler</span>
                </a>
                <a href="/dashboard/settings" class="nav-link active">
                    <i data-feather="settings"></i>
                    <span>Settings</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <a href="/dashboard/logout" class="nav-link" style="color: var(--danger)">
                    <i data-feather="log-out"></i>
                    <span>Logout</span>
                </a>
            </div>
        </aside>

        <div class="main-content">
            <header class="topbar">
                <div style="display:flex; align-items:center; gap:1rem">
                    <button class="mobile-toggle" id="sidebarToggle">
                        <i data-feather="menu"></i>
                    </button>
                    <h3 class="page-title">Settings</h3>
                </div>
            </header>

            <main class="content-wrapper">
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 1.5rem;">
                    <!-- Holidays Section -->
                    <div class="card">
                        <div class="card-header">
                            <h4 class="card-title">Custom Holidays</h4>
                        </div>
                        <div class="card-body">
                            <div style="display: flex; gap: 0.75rem; margin-bottom: 1.5rem;">
                                <input type="date" id="holidayDate" class="form-input" style="flex: 1;">
                                <button class="btn btn-primary" onclick="addHoliday()">
                                    <i data-feather="plus" style="width:16px"></i> Add
                                </button>
                            </div>
                            <div id="holidaysList" style="display: flex; flex-direction: column; gap: 0.5rem;">
                                <!-- Dynamic List -->
                            </div>
                        </div>
                    </div>

                    <!-- Groups Section -->
                    <div class="card">
                        <div class="card-header">
                            <h4 class="card-title">Group Whitelist</h4>
                        </div>
                        <div class="card-body">
                            <div class="form-group">
                                <label class="form-label" for="groupId">Group ID</label>
                                <div style="display: flex; gap: 0.75rem;">
                                    <input type="text" id="groupId" class="form-input" style="flex: 1;"
                                        placeholder="e.g. 123456@g.us">
                                    <button class="btn btn-primary" onclick="addGroup()">
                                        <i data-feather="plus" style="width:16px"></i> Add
                                    </button>
                                </div>
                            </div>

                            <div class="card"
                                style="background-color: var(--bg-surface-hover); border: none; margin-bottom: 1.5rem;">
                                <div class="card-body" style="padding: 1rem;">
                                    <h5 style="font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.5rem;">HOW
                                        TO GET GROUP ID</h5>
                                    <p style="font-size: 0.875rem;">Send <code>!dev showid</code> in the WhatsApp group.
                                    </p>
                                </div>
                            </div>

                            <div id="groupsList" style="display: flex; flex-direction: column; gap: 0.5rem;">
                                <!-- Dynamic List -->
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="/dashboard/js/dashboard.js"></script>
</body>

</html>
